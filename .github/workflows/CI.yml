name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Compile main code
        run: |
          cd RBAC_Project/src/allfiles
          javac *.java
  
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JUnit
        run: |
          cd RBAC_Project
          wget -O junit-platform-console-standalone.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar
      
      - name: Compile main code to out
        run: |
          cd RBAC_Project/src/allfiles
          javac -d ../../out *.java
      
      - name: Compile tests
        run: |
          cd RBAC_Project/src/tests
          javac -cp ".:../../out:../../junit-platform-console-standalone.jar" *.java
     
      - name: Check compiled test classes
        run: |
          cd RBAC_Project
          echo "=== Checking if test .class files exist ==="
          find out -name "*Test*.class" 2>/dev/null || echo "No test classes found in out"
          echo "=== Checking source test files ==="
          ls -la src/tests/*.java
          echo "=== Checking if tests have @Test ==="
          grep -l "@Test" src/tests/*.java || echo "No @Test annotations found"
      
      - name: Run tests
        run: |
          cd RBAC_Project
          java -jar junit-platform-console-standalone.jar --class-path out:src/tests --scan-class-path
          echo "Test report generated"
