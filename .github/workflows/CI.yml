name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: find RBAC_Project/src -name "*.java" ! -name "*Test*.java" > sources.txt && javac @sources.txt
