name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Compile main code
        run: |
          cd RBAC_Project/src/allfiles
          javac *.java
      
      - name: Compile tests
        run: |
          cd RBAC_Project/src/tests
          javac -cp ".:../src/allfiles:junit-platform-console-standalone-1.10.2.jar" *.java
      
      - name: Run tests
        run: |
          cd RBAC_Project/src/tests
          java -jar junit-platform-console-standalone-1.10.2.jar --class-path .:../src/allfiles --scan-class-path
