name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JUnit
        run: |
          cd RBAC_Project
          wget -O junit-platform-console-standalone.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar
      
      - name: Compile main code
        run: |
          cd RBAC_Project/src/allfiles
          javac -d ../../out *.java
      
      - name: Compile tests
        run: |
          cd RBAC_Project
          javac -cp "tests:src/allfiles:junit-platform-console-standalone.jar" -d out tests/*.java
      
      - name: Run tests
        run: |
          cd RBAC_Project
          java -jar junit-platform-console-standalone.jar --class-path out --scan-class-path
